# Nginx config for Docker container (simpler than production)
# No SSL here — SSL is terminated at the load balancer or external proxy

server {
    listen 80;
    server_name _;
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    # Health check for Docker/load balancers
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
        access_log off;
    }

    # SPA routing — always serve index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;

        # Cache Vite hashed bundles for 1 year
        location ~* \.(js|css|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Cache images/media
        location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
