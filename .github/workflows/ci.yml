name: CI/CD Pipeline — Enterprise Invoice Management System

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Job 1: Frontend — Lint, Type-check, Build
  # ============================================================
  frontend-ci:
    name: Frontend CI (TypeScript + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (zero errors required)
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
          VITE_APP_NAME: InvoiceManager
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================================
  # Job 2: Backend — Lint, Security Scan, Tests
  # ============================================================
  backend-ci:
    name: Backend CI (Django + Pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: invoice_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django system checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DJANGO_DEBUG: 'True'
          DJANGO_SECRET_KEY: 'ci-test-secret-key-not-for-production'
          POSTGRES_DB: invoice_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py check --deploy 2>&1 || true

      - name: Run database migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DJANGO_DEBUG: 'True'
          DJANGO_SECRET_KEY: 'ci-test-secret-key-not-for-production'
          POSTGRES_DB: invoice_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate --noinput

      - name: Run pytest with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DJANGO_DEBUG: 'True'
          DJANGO_SECRET_KEY: 'ci-test-secret-key-not-for-production'
          POSTGRES_DB: invoice_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest tests/ -v \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ============================================================
  # Job 3: Docker Build Verification
  # ============================================================
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: invoice-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          tags: invoice-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 4: Security Audit
  # ============================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
