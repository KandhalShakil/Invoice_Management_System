# =============================================================================
# Docker Compose — Enterprise Invoice Management System
# All secrets loaded from .env file — NO hardcoded credentials here
# =============================================================================

version: '3.8'

services:
  # ==========================================================================
  # PostgreSQL — Primary Database
  # ==========================================================================
  db:
    image: postgres:15-alpine
    container_name: enterprise_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - saas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Redis — Cache, Celery Broker, Channels Layer
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Django Backend — ASGI via Daphne (handles HTTP + WebSockets)
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise_backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # Celery Worker — Async task processing (emails, PDF generation, etc.)
  # ==========================================================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise_celery_worker
    command: celery -A config worker --loglevel=info --concurrency=4 --max-tasks-per-child=1000
    volumes:
      - media_files:/app/media
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas_network
    restart: unless-stopped

  # ==========================================================================
  # Celery Beat — Scheduled task scheduler (recurring invoices, overdue checks)
  # ==========================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas_network
    restart: unless-stopped

# =============================================================================
# Persistent Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local

# =============================================================================
# Networks — Isolated bridge network for security
# =============================================================================
networks:
  saas_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
